<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MrFrik</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      color: #333;
      width: 280px;
      padding: 16px;
      font-size: 13px;
    }
    .logo {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 2px solid #0b66c2;
    }
    .logo span { font-size: 15px; font-weight: 700; color: #0b66c2; }
    .logo small { font-size: 11px; color: #888; }

    .info-block {
      background: #fff; border: 1px solid #dde1ea; border-radius: 7px;
      padding: 12px 14px; margin-bottom: 10px;
    }
    .info-block .lbl { font-size: 11px; color: #888; margin-bottom: 3px; }
    .info-block .val { font-weight: 600; word-break: break-all; font-size: 13px; }
    .info-block .val.none { color: #e53935; font-weight: 400; font-style: italic; }
    .info-block .val.ok   { color: #34b251; }

    .hint {
      font-size: 11px; color: #888; line-height: 1.5; margin-top: 4px;
    }

    .clear-btn {
      margin-top: 6px; font-size: 11px; color: #e53935;
      cursor: pointer; text-decoration: underline;
      background: none; border: none; padding: 0; font-family: inherit;
    }
  </style>
</head>
<body>

<div class="logo">
  <span>&#128661; MrFrik</span>
  <small>Aukcje samochodowe</small>
</div>

<div class="info-block">
  <div class="lbl">Aktualny deal (z zakładki Bitrix24):</div>
  <div class="val" id="dealIdVal">—</div>
  <div class="lbl" style="margin-top:8px">Portal:</div>
  <div class="val ok">mrfrik.bitrix24.pl</div>
  <button class="clear-btn" id="clearDeal">Wyczyść deal ID</button>
</div>

<div class="hint">
  Aby załadować deal ID — otwórz zakładkę
  <strong>"Szukaj aut"</strong> w dowolnym dealu Bitrix24,
  a następnie kliknij IAAI lub Copart.
</div>

<script src="popup.js"></script>
</body>
</html>
