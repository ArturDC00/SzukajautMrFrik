# Po pushu do main/master: buduje wtyczkę (dist + ZIP), wgrywa deploy/ na hosting przez FTP.
# Wymaga sekretów w repozytorium GitHub (Settings → Secrets and variables → Actions).
#
# FTP_SERVER    — host (np. ftp.mrfrik.com lub IP)
# FTP_USERNAME  — login FTP
# FTP_PASSWORD  — hasło FTP
# FTP_REMOTE_DIR — katalog docelowy na serwerze, np. /public_html/mrfrik/ (z ukośnikiem na końcu)

name: Deploy mrfrik static + extension zip

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-mrfrik
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: chrome-extension/package-lock.json

      - name: Build artifacts (extension + HTML → deploy/)
        run: bash scripts/build-deploy-artifacts.sh

      # Bez tych sekretów SamKirkland/FTP-Deploy-Action kończy się: Input required and not supplied: server
      - name: Sprawdź sekrety FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          missing=0
          if [ -z "$FTP_SERVER" ]; then echo "::error::Brak sekretu FTP_SERVER"; missing=1; fi
          if [ -z "$FTP_USERNAME" ]; then echo "::error::Brak sekretu FTP_USERNAME"; missing=1; fi
          if [ -z "$FTP_PASSWORD" ]; then echo "::error::Brak sekretu FTP_PASSWORD"; missing=1; fi
          if [ -z "$FTP_REMOTE_DIR" ]; then echo "::error::Brak sekretu FTP_REMOTE_DIR"; missing=1; fi
          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "Ustaw w GitHub: Repozytorium → Settings → Secrets and variables → Actions → New repository secret"
            echo "Nazwy dokładnie: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD, FTP_REMOTE_DIR"
            echo "FTP_SERVER = host (np. 135.125.243.231 lub ftp.twojadomena.pl)"
            echo "FTP_REMOTE_DIR = pełna ścieżka na serwerze, np. /var/www/mrfrik/public/mrfrik/ (sprawdź w panelu hostingu)"
            exit 1
          fi

      - name: FTP upload
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          log-level: verbose
